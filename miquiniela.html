<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Mi Quiniela PRO
</title>

<link
rel="icon"
href="imagenes/logo1.png"
type="image/png"
/>

<link
rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;800&display=swap"
/>

<link
rel="stylesheet"
href="miquiniela.css"
/>

</head>

<body>

<div class="page">

  <header class="hero">

    <img
      src="imagenes/logo1.png"
      class="logo"
      alt="Logo"
    >

    <div>

      <h1>
        🏆 Mi Quiniela
      </h1>

      <p class="subtitulo">
        Revisa tus pronósticos y puntuación
      </p>

    </div>

  </header>

  <section class="panel-resumen">

    <div class="resumen-card principal">

      <span class="titulo-card">
        Puntuación Total
      </span>

      <div
        id="puntosTotales"
        class="valor-grande"
      >
        0 / 0
      </div>

    </div>

    <div class="resumen-card">

      <span class="titulo-card">
        ✅ Resultados Correctos
      </span>

      <div
        id="aciertosResultado"
        class="valor-mediano"
      >
        0
      </div>

    </div>

    <div class="resumen-card">

      <span class="titulo-card">
        ⭐ Marcadores Exactos
      </span>

      <div
        id="aciertosMarcador"
        class="valor-mediano"
      >
        0
      </div>

    </div>

  </section>

  <section class="barra-panel">

    <div class="barra-titulo">
      Rendimiento
    </div>

    <div class="barra-fondo">

      <div
        id="barraProgreso"
        class="barra-progreso"
      ></div>

    </div>

  </section>

  <section class="jornada-box">

    <h2
      id="jornada"
      class="jornada"
    >
      Jornada: —
    </h2>

  </section>

  <section
    id="contenedor"
    class="contenedor"
  >

  </section>

  <div
    id="resumen"
    class="resumen-final"
  >
  </div>

  <button
    class="btn-regresar"
    onclick="location.href='menu.html'"
  >
    ⬅️ Regresar al menú
  </button>

</div>

<script
type="module"
src="miquiniela.js"
></script>

</body>

</html>
